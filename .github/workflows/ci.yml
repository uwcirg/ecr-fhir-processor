name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, unit tests, dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Dev-only tool — the processor itself has zero runtime dependencies
      # (constitution: Zero-Dependency Runtime).
      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff)
        run: ruff check process.py tests/

      - name: Unit tests
        run: python3 -m unittest discover -s tests -v

      # Discovery + classification + stamping + collection->transaction transform over
      # the canonical fixtures. Must classify every fixture, failed=0, exit 0.
      - name: Dry-run over test fixtures
        run: python3 process.py --input-dir test/input --dry-run --verbose --output-dir output

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Constitution: Secret Protection. Reject committed real config / secret files.
      - name: Reject committed secrets
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)config\.json$|\.secret|(^|/)\.env$' ; then
            echo "ERROR: a secret/real-config file is tracked in git. Remove it and add to .gitignore." >&2
            exit 1
          fi
          echo "OK: no config.json / *.secret* / .env tracked."

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  conformance-gate:
    name: FHIR conformance gate (HL7 validator)
    runs-on: ubuntu-latest
    # NOTE: This gate cannot be green until the IG versions are pinned in config
    # (hl7.fhir.us.ecr / us.core / davinci-deqm are TODO_PIN — see tasks T036 and
    # TODO(ECR_IG_VERSION) in the constitution). Until then it runs informationally so
    # the rest of CI is not blocked by an upstream-version dependency.
    continue-on-error: true
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Cache the HL7 validator jar and its package cache (~/.fhir) so we don't
      # re-download the IG packages on every run. Pattern from
      # uwcirg/wahealth-csv-to-safr-fhir.
      - name: Cache FHIR validator
        uses: actions/cache@v4
        with:
          path: |
            validator_cli.jar
            ~/.fhir
          key: fhir-validator-${{ runner.os }}

      - name: Download FHIR validator
        run: |
          if [ ! -f validator_cli.jar ]; then
            curl -L -o validator_cli.jar \
              https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar
          fi

      - name: Produce would-be submissions (dry-run)
        run: python3 process.py --input-dir test/input --dry-run --output-dir output

      - name: Validate with versioned IG packages
        run: scripts/validate.sh "output/**/*.json" config.example.json
